version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 10
    groups:
      dotnet-dependencies:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:30"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    groups:
      github-actions:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
