name: Build and test

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: apphost-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: Legacy.Maliev.AppHost
    steps:
      - name: Check out AppHost
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: Legacy.Maliev.AppHost
          persist-credentials: false
      - name: Check out Country service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.CountryService
          ref: 8edb92507edf02ac49faf3b51bc33708f9a44cdf
          path: Legacy.Maliev.CountryService
          persist-credentials: false
      - name: Check out service defaults
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Maliev.Aspire
          ref: 085f24b8b6b19c5a8e932b229d93421b03bcd032
          path: Maliev.Aspire
          persist-credentials: false
      - name: Check out messaging contracts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Maliev.MessagingContracts
          ref: d4836f135d1cf311b2a490d9ba03809ff295e854
          path: Maliev.MessagingContracts
          persist-credentials: false
      - name: Set up .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: 10.0.x
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Legacy.Maliev.AppHost/**/*.csproj', 'Legacy.Maliev.AppHost/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Restore
        run: GITHUB_ACTIONS=false dotnet restore Legacy.Maliev.AppHost.slnx
      - name: Build
        run: GITHUB_ACTIONS=false dotnet build Legacy.Maliev.AppHost.slnx --configuration Release --no-restore
      - name: Test
        run: GITHUB_ACTIONS=false dotnet test Legacy.Maliev.AppHost.slnx --configuration Release --no-build --no-restore
      - name: Format
        run: GITHUB_ACTIONS=false dotnet format Legacy.Maliev.AppHost.slnx --verify-no-changes --no-restore
      - name: Vulnerability audit
        run: GITHUB_ACTIONS=false dotnet list Legacy.Maliev.AppHost.slnx package --vulnerable --include-transitive --no-restore
