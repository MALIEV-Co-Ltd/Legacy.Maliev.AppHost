name: Build and test

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: apphost-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out AppHost
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: Legacy.Maliev.AppHost
          persist-credentials: false
      - name: Check out Country service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.CountryService
          ref: 0a51f1db261186e759509367c3e8e7847fdc342c
          path: Legacy.Maliev.CountryService
          persist-credentials: false
