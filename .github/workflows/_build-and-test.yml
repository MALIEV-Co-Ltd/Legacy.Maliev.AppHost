name: Build and test

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: apphost-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out AppHost
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          path: Legacy.Maliev.AppHost
          persist-credentials: false
      - name: Check out Country service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.CountryService
          ref: 55e4ea77519736f935dfaa1f04386c9cb60d3027
          path: Legacy.Maliev.CountryService
          persist-credentials: false
      - name: Check out Document service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.DocumentService
          ref: a56a2cadb55aba93026cb5b7dbb8bb0e94597df5
          path: Legacy.Maliev.DocumentService
          persist-credentials: false
      - name: Check out Auth service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.AuthService
          ref: abbe40e494ee77ba10c82331847073f97f2ab6e7
          path: Legacy.Maliev.AuthService
          persist-credentials: false
      - name: Check out Customer service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.CustomerService
          ref: bd7ae25ac47ac107a641f5ff06c0f9041a306c82
          path: Legacy.Maliev.CustomerService
          persist-credentials: false
      - name: Check out Notification service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.NotificationService
          ref: c573988b97c9099c5148bf038c518ee263ecdef3
          path: Legacy.Maliev.NotificationService
          persist-credentials: false
      - name: Check out Order service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.OrderService
          ref: 37749e2e12016864376b3df7a6da2cd09905cf3d
          path: Legacy.Maliev.OrderService
          persist-credentials: false
      - name: Check out Quotation service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.QuotationService
          ref: 3074be18147a120a7ada06a252a11171c2731667
          path: Legacy.Maliev.QuotationService
          persist-credentials: false
      - name: Check out legacy service defaults
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.ServiceDefaults
          ref: 67cd84ccd47be656383b0025e9f2b8d1d3f0eb36
          path: Legacy.Maliev.ServiceDefaults
          persist-credentials: false
      - name: Check out compatibility contracts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.CompatibilityContracts
          ref: 95c62eb6209411f5aada443b315447a2f76ca0cd
          path: Legacy.Maliev.CompatibilityContracts
          persist-credentials: false
      - name: Check out Web BFF
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.Web
          ref: 345176b3e6d977e1428afc227eddad7267b147aa
          path: Legacy.Maliev.Web
          persist-credentials: false
      - name: Check out Employee service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.EmployeeService
          ref: f901f601f661d54d394d263191a9180d0c37182a
          path: Legacy.Maliev.EmployeeService
          persist-credentials: false
      - name: Check out Catalog service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.CatalogService
          ref: 97572d02ba6d1341338e749c215444fdf13868e8
          path: Legacy.Maliev.CatalogService
          persist-credentials: false
      - name: Check out Procurement service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.ProcurementService
          ref: 7a3cd802b1b35994c4bb59d29d46ac07450794a3
          path: Legacy.Maliev.ProcurementService
          persist-credentials: false
      - name: Check out File service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.FileService
          ref: bd7cd339647f06363ff2e66d87214cf50cae1bd9
          path: Legacy.Maliev.FileService
          persist-credentials: false
      - name: Check out Intranet
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.Intranet
          ref: 9d23f25cc965d98876e20aabed480560d0b653a4
          path: Legacy.Maliev.Intranet
          persist-credentials: false
      - name: Check out Career service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.CareerService
          ref: 174fce682c7809706174bcc2fb5b80d8e6b04da1
          path: Legacy.Maliev.CareerService
          persist-credentials: false
      - name: Check out Contact service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.ContactService
          ref: 20c7705a0fdec20436f27913a8939d6cd8f94b5e
          path: Legacy.Maliev.ContactService
          persist-credentials: false
      - name: Check out Accounting service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Legacy.Maliev.AccountingService
          ref: 12a5d74a13dbe72ff72bb704f3ac09547aca6920
          path: Legacy.Maliev.AccountingService
          persist-credentials: false
      - name: Check out service defaults
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Maliev.Aspire
          ref: 979e1bcb3c3ed9c414f652c94b56297543c031b2
          path: Maliev.Aspire
          persist-credentials: false
      - name: Check out messaging contracts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: MALIEV-Co-Ltd/Maliev.MessagingContracts
          ref: main
          path: Maliev.MessagingContracts
          persist-credentials: false
      - name: Verify messaging contracts pin
        working-directory: Maliev.MessagingContracts
        shell: bash
        run: |
          test "$(git rev-parse HEAD)" = "9c41d6524a485bf03ba022b8170f47366ab1a77"
      - name: Validate .NET solution
        uses: MALIEV-Co-Ltd/Legacy.Maliev.Workflows/actions/dotnet-validate@6017816fa67f369d785ed30794f002cfd6299af7
        with:
          working-directory: Legacy.Maliev.AppHost
          solution: Legacy.Maliev.AppHost.slnx
          use-local-maliev-dependencies: 'true'
      - name: Generate Aspire manifest
        working-directory: Legacy.Maliev.AppHost
        env:
          LEGACY_WEB_BRANCH: main
          LEGACY_WEB_PORT: '59154'
        shell: bash
        run: >-
          export LEGACY_WEB_PROJECT="${GITHUB_WORKSPACE}/Legacy.Maliev.Web/Legacy.Maliev.Web/Legacy.Maliev.Web.csproj" &&
          export LEGACY_WEB_REPOSITORY="$(git -C "${GITHUB_WORKSPACE}/Legacy.Maliev.Web" remote get-url origin)" &&
          export LEGACY_WEB_COMMIT="$(git -C "${GITHUB_WORKSPACE}/Legacy.Maliev.Web" rev-parse HEAD)" &&
          test -f "${LEGACY_WEB_PROJECT}" &&
          test -z "$(git -C "${GITHUB_WORKSPACE}/Legacy.Maliev.Web" status --porcelain)" &&
          [[ "${LEGACY_WEB_COMMIT}" =~ ^[0-9a-f]{40}$ ]] &&
          dotnet run
          --project Legacy.Maliev.AppHost/Legacy.Maliev.AppHost.csproj
          --configuration Release
          --no-build
          --
          --publisher manifest
          --output-path "${{ runner.temp }}/legacy-apphost-manifest.json"
      - name: Verify Intranet BFF manifest contract
        shell: pwsh
        working-directory: Legacy.Maliev.AppHost
        run: >-
          ./scripts/verify-intranet-bff-manifest.ps1
          -ManifestPath "${{ runner.temp }}/legacy-apphost-manifest.json"
      - name: Verify Accounting identity manifest contract
        shell: pwsh
        working-directory: Legacy.Maliev.AppHost
        run: >-
          ./scripts/verify-accounting-identity-manifest.ps1
          -ManifestPath "${{ runner.temp }}/legacy-apphost-manifest.json"
